<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #16161f;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0; --muted: #6b6b80;
    --accent: #7c6aff; --red: #ff5e6a; --green: #3ddc97; --amber: #f5a623;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
  .logo { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); }
  .logo-mark { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo-sub { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
  nav { padding: 16px 12px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; margin-bottom: 2px; user-select: none; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(124,106,255,0.15); color: var(--accent); }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
  .db-status { font-size: 10px; font-family: var(--mono); color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .dot.red { background: var(--red); }
  .main { margin-left: 220px; min-height: 100vh; }
  .topbar { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,15,0.9); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50; }
  .page-title { font-size: 15px; font-weight: 600; }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .save-ind { font-size: 10px; font-family: var(--mono); color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .content { padding: 32px; }
  .tab-page { display: none; }
  .tab-page.active { display: block; }
  .btn { padding: 9px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; font-family: var(--sans); cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9180ff; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
  .btn-ghost:hover { color: var(--text); }
  .btn-edit { background: transparent; color: var(--muted); border: 1px solid var(--border2); padding: 5px 10px; font-size: 11px; border-radius: 6px; cursor: pointer; font-family: var(--sans); margin-right: 4px; }
  .btn-edit:hover { color: var(--text); }
  .btn-del { background: transparent; color: var(--red); border: 1px solid rgba(255,94,106,0.25); padding: 5px 10px; font-size: 11px; border-radius: 6px; cursor: pointer; font-family: var(--sans); }
  .btn-del:hover { background: rgba(255,94,106,0.1); }
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .metric-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .metric-value { font-size: 26px; font-weight: 700; line-height: 1; }
  .metric-value.pos { color: var(--green); }
  .metric-value.neg { color: var(--red); }
  .metric-sub { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 6px; }
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 28px; }
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .chart-title { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-title { font-size: 13px; font-weight: 600; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-select, .filter-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-size: 11px; font-family: var(--mono); padding: 6px 10px; border-radius: 6px; outline: none; }
  .filter-select:focus, .filter-input:focus { border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 16px; font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); font-weight: 400; white-space: nowrap; }
  td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: var(--mono); font-size: 12px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; font-family: var(--mono); letter-spacing: 0.05em; }
  .badge-long { background: rgba(61,220,151,0.12); color: var(--green); }
  .badge-short { background: rgba(255,94,106,0.12); color: var(--red); }
  .badge-open { background: rgba(124,106,255,0.12); color: var(--accent); }
  .badge-win { background: rgba(61,220,151,0.12); color: var(--green); }
  .badge-loss { background: rgba(255,94,106,0.12); color: var(--red); }
  .badge-be { background: rgba(245,166,35,0.12); color: var(--amber); }
  .pnl-pos { color: var(--green); font-weight: 500; }
  .pnl-neg { color: var(--red); font-weight: 500; }
  .sym { font-weight: 600; color: var(--text); font-family: var(--sans); font-size: 13px; }
  .muted { color: var(--muted); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--mono); font-size: 12px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 400px; max-width: 95vw; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-head h2 { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .modal-close:hover { color: var(--text); }
  .form-fields { display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .field input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 14px; padding: 11px 14px; border-radius: 8px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field input:focus { border-color: var(--accent); }
  .dir-btns { display: flex; gap: 8px; }
  .dir-btn { flex: 1; padding: 11px; border-radius: 8px; font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: transparent; color: var(--muted); }
  .dir-btn.active-long { border-color: rgba(61,220,151,0.5); background: rgba(61,220,151,0.12); color: var(--green); }
  .dir-btn.active-short { border-color: rgba(255,94,106,0.5); background: rgba(255,94,106,0.12); color: var(--red); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-card-title { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; font-family: var(--mono); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(124,106,255,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 18px; font-size: 12px; font-family: var(--mono); z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: rgba(61,220,151,0.3); color: var(--green); }
  .toast.err { border-color: rgba(255,94,106,0.3); color: var(--red); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  @media (max-width: 860px) {
    .sidebar { width: 56px; }
    .nav-item span:not(.nav-icon) { display: none; }
    .logo-sub, .logo-mark span:not(.logo-icon) { display: none; }
    .main { margin-left: 56px; }
    .charts-row, .stats-grid { grid-template-columns: 1fr; }
    .stat-card.full { grid-column: 1; }
    .content { padding: 16px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">📈</div>
      <span>TJ</span>
    </div>
    <div class="logo-sub">Trading Journal</div>
  </div>
  <nav>
    <div class="nav-item active" onclick="nav('dashboard',this)"><span class="nav-icon">▦</span><span>Dashboard</span></div>
    <div class="nav-item" onclick="nav('trades',this)"><span class="nav-icon">☰</span><span>Trades</span></div>
    <div class="nav-item" onclick="nav('stats',this)"><span class="nav-icon">◎</span><span>Statistiques</span></div>
  </nav>
  <div class="sidebar-footer">
    <div class="db-status">
      <div class="dot red" id="dot"></div>
      <span id="db-label">Connexion...</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div class="topbar-right">
      <div class="save-ind" id="save-ind"></div>
      <button class="btn btn-primary" onclick="openModal()">+ Nouveau trade</button>
    </div>
  </div>
  <div class="content">

    <div id="page-dashboard" class="tab-page active">
      <div class="metrics-grid" id="metrics"></div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Courbe P&amp;L cumulé</div>
          <div style="position:relative;height:200px"><canvas id="chartEq" role="img" aria-label="Courbe de capital"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">P&amp;L par symbole</div>
          <div style="position:relative;height:200px"><canvas id="chartAs" role="img" aria-label="PnL par actif"></canvas></div>
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">Derniers trades</div></div>
        <div id="recent"></div>
      </div>
    </div>

    <div id="page-trades" class="tab-page">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Toutes les positions</div>
          <div class="filters">
            <input class="filter-input" type="text" placeholder="Rechercher..." id="fs" oninput="renderTrades()">
            <select class="filter-select" id="fd" onchange="renderTrades()">
              <option value="">Direction</option>
              <option>Long</option><option>Short</option>
            </select>
            <select class="filter-select" id="fr" onchange="renderTrades()">
              <option value="">Résultat</option>
              <option value="win">Gains</option>
              <option value="loss">Pertes</option>
              <option value="open">Ouverts</option>
            </select>
          </div>
        </div>
        <div id="trades-list"></div>
      </div>
    </div>

    <div id="page-stats" class="tab-page">
      <div id="stats-content"></div>
    </div>

  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Nouveau trade</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-fields">
      <div class="field">
        <label>Symbole *</label>
        <input type="text" id="f-sym" placeholder="BTC, EURUSD, AAPL..." autocomplete="off">
      </div>
      <div class="field">
        <label>Direction</label>
        <div class="dir-btns">
          <button class="dir-btn active-long" id="btn-long" onclick="setDir('Long')">LONG</button>
          <button class="dir-btn" id="btn-short" onclick="setDir('Short')">SHORT</button>
        </div>
      </div>
      <div class="two-col">
        <div class="field">
          <label>Prix d'entrée *</label>
          <input type="number" id="f-entry" placeholder="0.00" step="any">
        </div>
        <div class="field">
          <label>Prix de sortie</label>
          <input type="number" id="f-exit" placeholder="Ouvert si vide" step="any">
        </div>
      </div>
      <div class="field">
        <label>P&amp;L ($)</label>
        <input type="number" id="f-pnl" placeholder="+45.00 ou -12.00" step="any">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveTrade()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SB_URL = 'https://fshwpsigmomqzrhqpgnq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzaHdwc2lnbW9tcXpyaHFwZ25xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Mjc2MDMsImV4cCI6MjA5MjMwMzYwM30.yl4D34rNrVXj9u7mdJDles1JWzLE72litECAScmvLWQ';
const H = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };

let trades=[], editId=null, dir='Long', cEq=null, cAs=null;

async function dbLoad() {
  setInd('loading');
  try {
    const r = await fetch(SB_URL+'/rest/v1/trades?order=created_at.desc', {headers:H});
    if (!r.ok) throw new Error(r.status);
    const rows = await r.json();
    trades = rows.map(row => ({
      id: row.id, symbol: row.symbol, side: row.side,
      entry: row.entry, exit: row.exit, manualPnl: row.manual_pnl,
      date: (row.date||row.created_at||'').slice(0,16)
    }));
    setStatus(true); setInd('');
  } catch(e) {
    setStatus(false); setInd('');
    toast('⚠ Impossible de se connecter à Supabase','err');
  }
  renderAll();
}

async function dbInsert(t) {
  const r = await fetch(SB_URL+'/rest/v1/trades', {
    method:'POST',
    headers: {...H, 'Prefer':'return=minimal'},
    body: JSON.stringify({id:t.id, symbol:t.symbol, side:t.side, entry:t.entry, exit:t.exit||null, manual_pnl:t.manualPnl??null, date:t.date})
  });
  if (!r.ok) throw new Error(await r.text());
}

async function dbUpdate(t) {
  const r = await fetch(SB_URL+'/rest/v1/trades?id=eq.'+t.id, {
    method:'PATCH',
    headers: {...H, 'Prefer':'return=minimal'},
    body: JSON.stringify({symbol:t.symbol, side:t.side, entry:t.entry, exit:t.exit||null, manual_pnl:t.manualPnl??null, date:t.date})
  });
  if (!r.ok) throw new Error(await r.text());
}

async function dbDelete(id) {
  const r = await fetch(SB_URL+'/rest/v1/trades?id=eq.'+id, {method:'DELETE', headers:H});
  if (!r.ok) throw new Error(r.status);
}

function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function getPnl(t) {
  if (t.manualPnl != null) return t.manualPnl;
  if (!t.exit) return null;
  return parseFloat(((t.side==='Long' ? t.exit-t.entry : t.entry-t.exit)).toFixed(4));
}

function getRes(t) {
  const p=getPnl(t);
  if (p===null) return 'open';
  if (p>0) return 'win';
  if (p<0) return 'loss';
  return 'be';
}

function fmtPnl(v) {
  if (v===null) return '<span class="muted">Ouvert</span>';
  return `<span class="${v>=0?'pnl-pos':'pnl-neg'}">${v>=0?'+':''}${v.toFixed(2)}</span>`;
}

function setStatus(ok) {
  document.getElementById('dot').className='dot'+(ok?'':' red');
  document.getElementById('db-label').textContent=ok?'Supabase ✓':'Hors ligne';
}

function setInd(s) {
  const el=document.getElementById('save-ind');
  if(s==='loading') el.innerHTML='<div class="spinner"></div> Chargement...';
  else if(s==='saving') el.innerHTML='<div class="spinner"></div> Sauvegarde...';
  else if(s==='saved') el.innerHTML='✓ Sauvegardé';
  else el.innerHTML='';
}

function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),3000);
}

function setDir(d) {
  dir=d;
  document.getElementById('btn-long').className='dir-btn'+(d==='Long'?' active-long':'');
  document.getElementById('btn-short').className='dir-btn'+(d==='Short'?' active-short':'');
}

function openModal() {
  editId=null;
  ['f-sym','f-entry','f-exit','f-pnl'].forEach(i=>document.getElementById(i).value='');
  setDir('Long');
  document.getElementById('modal-title').textContent='Nouveau trade';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-sym').focus(),100);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editId=null; }
function overlayClick(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

async function saveTrade() {
  const sym=document.getElementById('f-sym').value.trim().toUpperCase();
  if(!sym){toast('⚠ Symbole requis','err');return;}
  const entry=parseFloat(document.getElementById('f-entry').value);
  if(!entry){toast('⚠ Prix d\'entrée requis','err');return;}
  const exitVal=document.getElementById('f-exit').value;
  const pnlVal=document.getElementById('f-pnl').value;
  const t = {
    id: editId||genId(), symbol: sym, side: dir, entry,
    exit: exitVal?parseFloat(exitVal):null,
    manualPnl: pnlVal!==''?parseFloat(pnlVal):null,
    date: new Date().toISOString().slice(0,16)
  };
  closeModal(); setInd('saving');
  try {
    if(editId){ await dbUpdate(t); trades=trades.map(x=>x.id===editId?t:x); }
    else { await dbInsert(t); trades.unshift(t); }
    setStatus(true); setInd('saved');
    setTimeout(()=>setInd(''),2000);
    toast('✓ Trade sauvegardé','ok');
  } catch(e) {
    setStatus(false); setInd('');
    toast('⚠ Erreur de sauvegarde — vérifie ta connexion','err');
  }
  renderAll();
}

async function deleteTrade(id) {
  if(!confirm('Supprimer ce trade ?')) return;
  try {
    await dbDelete(id);
    trades=trades.filter(x=>x.id!==id);
    toast('Trade supprimé','ok'); renderAll();
  } catch(e) { toast('⚠ Erreur suppression','err'); }
}

function editTrade(id) {
  const t=trades.find(x=>x.id===id); if(!t) return;
  editId=id;
  document.getElementById('f-sym').value=t.symbol;
  document.getElementById('f-entry').value=t.entry;
  document.getElementById('f-exit').value=t.exit||'';
  document.getElementById('f-pnl').value=t.manualPnl??'';
  setDir(t.side||'Long');
  document.getElementById('modal-title').textContent='Modifier le trade';
  document.getElementById('overlay').classList.add('open');
}

function nav(page,el) {
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
  document.getElementById('page-title').textContent={dashboard:'Dashboard',trades:'Trades',stats:'Statistiques'}[page];
  if(page==='stats') renderStats();
}

function tableHTML(list, actions=false) {
  if(!list.length) return '<div class="empty">Aucun trade à afficher</div>';
  return `<table><thead><tr>
    <th>Date</th><th>Symbole</th><th>Direction</th><th>Entrée</th><th>Sortie</th><th>P&L</th><th>Résultat</th>
    ${actions?'<th></th>':''}
  </tr></thead><tbody>${list.map(t=>{
    const pnl=getPnl(t), res=getRes(t);
    const rb={win:'<span class="badge badge-win">GAIN</span>',loss:'<span class="badge badge-loss">PERTE</span>',be:'<span class="badge badge-be">BE</span>',open:'<span class="badge badge-open">OUVERT</span>'}[res];
    return `<tr>
      <td class="muted">${t.date?t.date.slice(0,10):'—'}</td>
      <td><span class="sym">${t.symbol}</span></td>
      <td><span class="badge ${t.side==='Long'?'badge-long':'badge-short'}">${t.side.toUpperCase()}</span></td>
      <td>${t.entry??'—'}</td>
      <td>${t.exit??'<span class="muted">—</span>'}</td>
      <td>${fmtPnl(pnl)}</td>
      <td>${rb}</td>
      ${actions?`<td><button class="btn-edit" onclick="editTrade('${t.id}')">✏</button><button class="btn-del" onclick="deleteTrade('${t.id}')">✕</button></td>`:''}
    </tr>`;
  }).join('')}</tbody></table>`;
}

function renderDashboard() {
  const closed=trades.filter(t=>getPnl(t)!==null);
  const open=trades.filter(t=>getPnl(t)===null);
  const wins=closed.filter(t=>getPnl(t)>0);
  const losses=closed.filter(t=>getPnl(t)<0);
  const total=closed.reduce((s,t)=>s+getPnl(t),0);
  const wr=closed.length?(wins.length/closed.length*100):0;
  const avgW=wins.length?wins.reduce((s,t)=>s+getPnl(t),0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+getPnl(t),0)/losses.length):0;
  const pf=avgL>0?(avgW/avgL).toFixed(2):'—';

  document.getElementById('metrics').innerHTML=[
    ['P&L Total',`${total>=0?'+':''}${total.toFixed(2)}`,total>=0?'pos':'neg',`${closed.length} trades fermés`],
    ['Win Rate',`${wr.toFixed(1)}%`,'',`${wins.length}W / ${losses.length}L`],
    ['Profit Factor',pf,'','gain moy / perte moy'],
    ['Gain moyen',`+${avgW.toFixed(2)}`,'pos','par trade gagnant'],
    ['Perte moyenne',`-${avgL.toFixed(2)}`,'neg','par trade perdant'],
    ['Ouverts',open.length,'','positions actives'],
  ].map(([l,v,c,s])=>`<div class="metric-card"><div class="metric-label">${l}</div><div class="metric-value ${c}">${v}</div><div class="metric-sub">${s}</div></div>`).join('');

  const sorted=[...closed].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let cum=0;
  const eqL=sorted.map(t=>t.date.slice(5,10));
  const eqD=sorted.map(t=>{cum+=getPnl(t);return parseFloat(cum.toFixed(2));});

  if(cEq) cEq.destroy();
  cEq=new Chart(document.getElementById('chartEq'),{
    type:'line',
    data:{labels:eqL.length?eqL:['—'],datasets:[{data:eqD.length?eqD:[0],borderColor:'#3ddc97',backgroundColor:'rgba(61,220,151,0.06)',tension:0.4,pointRadius:2,fill:true,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b6b80',font:{family:'DM Mono',size:10},maxTicksLimit:7},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#6b6b80',font:{family:'DM Mono',size:10}},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });

  const am={};
  closed.forEach(t=>{am[t.symbol]=(am[t.symbol]||0)+getPnl(t);});
  const al=Object.keys(am), ad=al.map(k=>parseFloat(am[k].toFixed(2)));
  if(cAs) cAs.destroy();
  cAs=new Chart(document.getElementById('chartAs'),{
    type:'bar',
    data:{labels:al.length?al:['—'],datasets:[{data:al.length?ad:[0],backgroundColor:al.length?ad.map(v=>v>=0?'rgba(61,220,151,0.75)':'rgba(255,94,106,0.75)'):['#333']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b6b80',font:{family:'DM Mono',size:10}},grid:{display:false}},y:{ticks:{color:'#6b6b80',font:{family:'DM Mono',size:10}},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });

  document.getElementById('recent').innerHTML=tableHTML(trades.slice(0,8));
}

function renderTrades() {
  const s=document.getElementById('fs').value.toLowerCase();
  const d=document.getElementById('fd').value;
  const r=document.getElementById('fr').value;
  const f=trades.filter(t=>{
    if(s&&!t.symbol.toLowerCase().includes(s)) return false;
    if(d&&t.side!==d) return false;
    const res=getRes(t);
    if(r==='win'&&res!=='win') return false;
    if(r==='loss'&&res!=='loss') return false;
    if(r==='open'&&res!=='open') return false;
    return true;
  });
  document.getElementById('trades-list').innerHTML=tableHTML(f,true);
}

function renderStats() {
  const closed=trades.filter(t=>getPnl(t)!==null);
  if(!closed.length){document.getElementById('stats-content').innerHTML='<div class="empty" style="margin-top:60px">Pas encore de trades fermés</div>';return;}
  const wins=closed.filter(t=>getPnl(t)>0);
  const losses=closed.filter(t=>getPnl(t)<0);
  const total=closed.reduce((s,t)=>s+getPnl(t),0);
  const wr=(wins.length/closed.length*100).toFixed(1);
  const avgW=wins.length?(wins.reduce((s,t)=>s+getPnl(t),0)/wins.length).toFixed(2):0;
  const avgL=losses.length?(losses.reduce((s,t)=>s+getPnl(t),0)/losses.length).toFixed(2):0;
  const pf=Math.abs(avgL)>0?(Math.abs(avgW)/Math.abs(avgL)).toFixed(2):'—';
  const best=closed.reduce((b,t)=>getPnl(t)>getPnl(b)?t:b,closed[0]);
  const worst=closed.reduce((b,t)=>getPnl(t)<getPnl(b)?t:b,closed[0]);
  let mxW=0,mxL=0,cW=0,cL=0;
  [...closed].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(t=>{
    if(getPnl(t)>0){cW++;cL=0;mxW=Math.max(mxW,cW);}
    else{cL++;cW=0;mxL=Math.max(mxL,cL);}
  });
  const sm={};
  closed.forEach(t=>{if(!sm[t.symbol])sm[t.symbol]={n:0,pnl:0,w:0};sm[t.symbol].n++;sm[t.symbol].pnl+=getPnl(t);if(getPnl(t)>0)sm[t.symbol].w++;});

  document.getElementById('stats-content').innerHTML=`
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-title">Métriques générales</div>
      ${[['Trades fermés',closed.length],['Win Rate',wr+'%'],['Profit Factor',pf],['Espérance/trade',(total/closed.length).toFixed(2)],['P&L Total',`<span class="${total>=0?'pnl-pos':'pnl-neg'}">${total>=0?'+':''}${total.toFixed(2)}</span>`]].map(([l,v])=>`<div class="stat-row"><span class="stat-label">${l}</span><span>${v}</span></div>`).join('')}
    </div>
    <div class="stat-card">
      <div class="stat-card-title">Gains &amp; Pertes</div>
      ${[['Gain moyen',`<span class="pnl-pos">+${avgW}</span>`],['Perte moyenne',`<span class="pnl-neg">${avgL}</span>`],['Meilleur trade',`<span class="pnl-pos">+${getPnl(best).toFixed(2)} (${best.symbol})</span>`],['Pire trade',`<span class="pnl-neg">${getPnl(worst).toFixed(2)} (${worst.symbol})</span>`],['Série wins max',`<span class="pnl-pos">${mxW}</span>`],['Série losses max',`<span class="pnl-neg">${mxL}</span>`]].map(([l,v])=>`<div class="stat-row"><span class="stat-label">${l}</span><span>${v}</span></div>`).join('')}
    </div>
    <div class="stat-card full">
      <div class="stat-card-title">Performance par symbole</div>
      ${Object.entries(sm).sort((a,b)=>b[1].pnl-a[1].pnl).map(([s,v])=>`<div class="stat-row"><span class="stat-label">${s} — ${v.n} trades, ${Math.round(v.w/v.n*100)}% win</span><span class="${v.pnl>=0?'pnl-pos':'pnl-neg'}">${v.pnl>=0?'+':''}${v.pnl.toFixed(2)}</span></div>`).join('')}
    </div>
  </div>`;
}

function renderAll() { renderDashboard(); renderTrades(); }

dbLoad();
</script>
</body>
</html>
